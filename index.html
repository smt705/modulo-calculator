<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>គណនារកលេខសេស</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: sans-serif;
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #000000);
        padding: 20px;
        text-align: center;
      }
      
      /* Target ONLY the number input, not the checkbox */
      input[type="number"],
      button {
        margin: 10px 0;
        padding: 10px;
        width: 80%;
        font-size: 16px;
        box-sizing: border-box;
      }
      
      button {
        background-color: var(--tg-theme-button-color, #3390ec);
        color: var(--tg-theme-button-text-color, #ffffff);
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }

      /* New styles to keep the checkbox and text on one line */
      .checkbox-label {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px; /* Space between checkbox and text */
        margin: 15px 0;
        font-size: 16px;
        cursor: pointer;
      }

      input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin: 0;
        cursor: pointer;
      }

      .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        display: none;
      }
      
      .highlight {
        font-size: 24px;
        font-weight: bold;
        color: var(--tg-theme-button-color, #3390ec);
      }
    </style>
  </head>
  <body>
    <h2>គណនារកលេខសេសប្រើឆ្នាំគស</h2>
    <p>សូមបញ្ចូលលេខឆ្នាំគ្រឺសករាជដើម្បីគណនារក សេស (សំណល់)</p>

    <input
      type="number"
      id="gregorianYear"
      placeholder="ឧទាហរណ៍ 2026"
      value="2026"
    />

    <label class="checkbox-label">
      <input type="checkbox" id="birthCheck" />កើតចន្លោះ ១មករា
      ដល់១៥មេសា(រាប់ទាំង១មករានិង១៥មេសាអោយតែមិនទាន់ឡើងស័កថ្មី)
    </label>

    <button onclick="calculateMahabote()">គណនារកលេខសេស</button>

    <div id="resultBox" class="result-box">
      <p>ឆ្នាំចុល្លសករាជ ៖ <span id="csYear"></span></p>
      <p>លទ្ធផល៖ <br /><span id="remainder" class="highlight"></span></p>
    </div>

    <script>
      window.Telegram.WebApp.ready();

      function calculateMahabote() {
        const yearInput = document.getElementById("gregorianYear").value;
        const resultBox = document.getElementById("resultBox");
        const csYearElement = document.getElementById("csYear");
        const remainderElement = document.getElementById("remainder");

        if (!yearInput) {
          alert("Please enter a year.");
          return;
        }

        const year = parseInt(yearInput, 10);

        if (year < 638) {
          alert("Year must be 638 or greater to calculate the Chula Sakarat era.");
          return;
        }

        const ans1 = year - 638;
        let remainder = ans1 % 7;

        const isChecked = document.getElementById("birthCheck").checked;
        if (isChecked) {
          remainder -= 1;
        }

        if (remainder <= 0) {
          remainder += 7;
        }

        const results = {
          1: "សេស១-ដួងអ្នកកំព្រា",
          2: "សេស២-ដួងអ្នកភាសា",
          3: "សេស៣-ដួងអ្នកគ្រប់គ្រង",
          4: "សេស៤-ដួងអ្នកសុខសាន្ត",
          5: "សេស៥-ដួងអ្នកសេដ្ឋី",
          6: "សេស៦-ដួងអ្នកវិជ្ជាការ",
          7: "សេស៧-ដួងមហាសេដ្ឋី",
        };

        csYearElement.innerText = ans1;
        remainderElement.innerText = results[remainder];
        resultBox.style.display = "block";
      }
    </script>
  </body>
</html>
